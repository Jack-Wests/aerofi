name: Build

# Compile-checks Aerofi on GitHub's free macOS runners on every push to main,
# so Swift compile errors get found and fixed WITHOUT a physical Mac.
# Diagnostics are echoed as ::error:: workflow commands because that is the
# only build-output channel readable back through this environment's API proxy.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build:
    # macos-15 ships Xcode 16 by default; XcodeGen 2.45+ writes the newer
    # Xcode-16 project format that Xcode 15.4 (on macos-14) cannot read.
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Environment info
        run: |
          echo "::error::XCODE $(xcodebuild -version | tr '\n' ' ')"
          echo "::error::SWIFT $(swift --version 2>&1 | tr '\n' ' ')"

      - name: Install XcodeGen
        run: |
          brew install xcodegen 2>&1 | tail -3 || true
          echo "::error::XCODEGEN which=$(which xcodegen 2>&1) version=$(xcodegen --version 2>&1 | tr '\n' ' ')"

      - name: Generate Xcode project
        run: |
          xcodegen generate --spec project.yml 2>&1 | tee /tmp/xcodegen.log || true
          echo "::error::AFTER_GEN $(ls -1 | tr '\n' ' ')"
          if [ ! -d Aerofi.xcodeproj ]; then
            echo "::error::PROJECT_MISSING"
            head -c 800 /tmp/xcodegen.log | tr '\n' '|' | sed 's/^/::error::XGLOG /'
            exit 1
          fi
          echo "::error::PROJECT_OK contents=$(ls -1 Aerofi.xcodeproj | tr '\n' ' ')"

      - name: Build for iOS Simulator
        run: |
          set -o pipefail
          xcodebuild build \
            -project Aerofi.xcodeproj \
            -scheme Aerofi \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO 2>&1 | tee /tmp/build.log

      - name: Surface compiler errors
        if: failure()
        run: |
          echo "## Build failed — compiler output" >> "$GITHUB_STEP_SUMMARY"
          if [ -f /tmp/build.log ]; then
            grep -E "error:|Unable to|cannot find|no such|No such" /tmp/build.log | sort -u | head -20 | while IFS= read -r line; do
              echo "::error::${line}"
              echo "- ${line}" >> "$GITHUB_STEP_SUMMARY"
            done
          fi
          exit 1
