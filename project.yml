# XcodeGen spec — generates Aerofi.xcodeproj from this simple file so the app
# can be built in CI (and locally) without hand-maintaining a huge .pbxproj.
#
# To open the project on a Mac:
#   brew install xcodegen && xcodegen generate && open Aerofi.xcodeproj
#
# CI (.github/workflows/build.yml) runs exactly that, then compiles for the
# iOS Simulator — this is how we catch compile errors without a physical Mac.
name: Aerofi
options:
  bundleIdPrefix: com.jackwests
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
targets:
  Aerofi:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Aerofi
        excludes:
          - "Info.plist"   # reference copy only; the built plist is generated below
    info:
      path: Aerofi/Generated-Info.plist
      properties:
        CFBundleDisplayName: Aerofi
        UILaunchScreen: {}
        UIBackgroundModes: [audio]
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true
        LSApplicationCategoryType: public.app-category.music
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jackwests.aerofi
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"   # iPhone
schemes:
  Aerofi:
    build:
      targets:
        Aerofi: all
    run:
      config: Debug
