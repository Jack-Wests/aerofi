<title>Aerofi — Interactive Preview</title>
<style>
  @font-face {
    font-family: 'SFRounded';
    src: local('SF Pro Rounded'), local('-apple-system-ui-rounded');
  }
  :root{
    --sky:#4FB8FA; --deep:#155FC4; --aqua:#2FD6C9; --leaf:#6BDD5E;
    --ink:#0F2740; --ink-soft:#3C5872; --ink-faint:#6E88A0;
    --glass:rgba(255,255,255,.52); --glass-strong:rgba(255,255,255,.72);
    --glass-line:rgba(255,255,255,.75);
    --page-a:#0e3f86; --page-b:#3fa7e8; --page-c:#39d9c9; --page-d:#7fe07a;
    --shadow-deep: rgba(10,40,80,.35);
    --font: ui-rounded, "SF Pro Rounded", "SFRounded", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  }
  :root[data-theme="dark"]{
    --ink:#EAF3FF; --ink-soft:#B9CFE6; --ink-faint:#8AA6C0;
    --glass:rgba(20,34,54,.50); --glass-strong:rgba(24,40,62,.68);
    --glass-line:rgba(255,255,255,.16);
    --page-a:#040f24; --page-b:#0c2c55; --page-c:#0b3f45; --page-d:#123a1c;
  }
  @media (prefers-color-scheme: dark){
    :root:not([data-theme="light"]){
      --ink:#EAF3FF; --ink-soft:#B9CFE6; --ink-faint:#8AA6C0;
      --glass:rgba(20,34,54,.50); --glass-strong:rgba(24,40,62,.68);
      --glass-line:rgba(255,255,255,.16);
      --page-a:#040f24; --page-b:#0c2c55; --page-c:#0b3f45; --page-d:#123a1c;
    }
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%;}
  body{
    font-family:var(--font);
    color:var(--ink);
    background:
      radial-gradient(ellipse 900px 500px at 15% 8%, rgba(255,255,255,.35), transparent 60%),
      linear-gradient(160deg, var(--page-a), var(--page-b) 45%, var(--page-c) 78%, var(--page-d));
    min-height:100vh;
    display:flex; align-items:center; justify-content:center;
    padding:28px 16px;
    overflow-x:hidden;
  }
  .backdrop-bubble{position:fixed; border-radius:50%; pointer-events:none;
    background:radial-gradient(circle, rgba(255,255,255,.5), rgba(255,255,255,0) 70%);
    animation: drift 9s ease-in-out infinite alternate;}
  @media (prefers-reduced-motion: reduce){ .backdrop-bubble{animation:none;} }
  @keyframes drift{ from{ transform:translateY(0) scale(1);} to{ transform:translateY(-16px) scale(1.06);} }

  .stage{ display:flex; flex-direction:column; align-items:center; gap:14px; position:relative; z-index:1; }
  .stage-label{ color:rgba(255,255,255,.92); text-align:center; max-width:420px; }
  .stage-label h1{ font-size:clamp(22px,4vw,28px); margin:0 0 4px; font-weight:800; letter-spacing:-.01em; text-wrap:balance;}
  .stage-label p{ margin:0; font-size:14px; color:rgba(255,255,255,.78); line-height:1.5; }

  .phone{
    width:390px; max-width:92vw; height:min(844px, 86vh);
    border-radius:54px;
    background: linear-gradient(180deg, #0c1a2c, #050c17);
    padding:14px;
    box-shadow: 0 40px 80px -20px var(--shadow-deep), 0 0 0 1px rgba(255,255,255,.08) inset;
    position:relative;
  }
  .phone::before{ /* notch */
    content:""; position:absolute; top:14px; left:50%; transform:translateX(-50%);
    width:118px; height:24px; background:#050c17; border-radius:0 0 18px 18px; z-index:30;
  }
  .screen{
    position:relative; width:100%; height:100%; border-radius:40px; overflow:hidden;
    background:
      radial-gradient(ellipse 500px 300px at 20% 0%, rgba(255,255,255,.4), transparent 55%),
      linear-gradient(165deg, var(--sky), var(--aqua) 55%, var(--leaf) 100%);
  }

  .bokeh{ position:absolute; inset:0; pointer-events:none; }
  .bokeh span{ position:absolute; border-radius:50%;
    background:radial-gradient(circle, rgba(255,255,255,.55), rgba(255,255,255,0) 70%);
    animation: drift 7s ease-in-out infinite alternate; }

  /* aquarium: fish + bubbles + seagrass, behind all UI */
  .aquarium{ position:absolute; inset:0; pointer-events:none; overflow:hidden; z-index:1; }
  .fish{ position:absolute; will-change:left; }
  .fish svg{ display:block; width:100%; filter:drop-shadow(0 3px 4px rgba(10,40,80,.25)); }
  .bob{ animation:bobk 2.8s ease-in-out infinite alternate; }
  @keyframes bobk{ from{transform:translateY(-6px)} to{transform:translateY(6px)} }
  @keyframes swimLR{ from{left:-95px} to{left:105%} }
  @keyframes swimRL{ from{left:105%} to{left:-95px} }
  .bubble{ position:absolute; top:100%; border-radius:50%;
    border:1px solid rgba(255,255,255,.55);
    background:radial-gradient(circle at 35% 30%, rgba(255,255,255,.75), rgba(255,255,255,.08) 60%);
    animation:riseB linear infinite; }
  @keyframes riseB{ from{transform:translateY(0);opacity:.9} to{transform:translateY(-880px);opacity:0} }
  .grass-wrap{ position:absolute; bottom:-4px; }
  .grass-wrap svg{ display:block; transform-origin:50% 100%; animation:sway 5s ease-in-out infinite alternate; }
  @keyframes sway{ from{transform:rotate(-3.5deg)} to{transform:rotate(3.5deg)} }
  @media (prefers-reduced-motion: reduce){
    .fish,.bob,.bubble,.grass-wrap svg{ animation:none !important; }
    .bubble{ display:none; }
  }

  .content{ position:absolute; inset:0; z-index:2; padding-top:56px; padding-bottom:150px; overflow-y:auto; -webkit-overflow-scrolling:touch;}
  .content::-webkit-scrollbar{ display:none; }

  .topbar{ position:absolute; top:0; left:0; right:0; padding:16px 20px 10px; z-index:20;
    display:flex; align-items:center; justify-content:space-between; }
  .topbar h2{ margin:0; font-size:22px; font-weight:800; color:var(--ink); letter-spacing:-.01em; text-shadow:0 1px 0 rgba(255,255,255,.3);}
  .icon-btn{ width:34px; height:34px; border-radius:50%; border:1px solid var(--glass-line);
    background:linear-gradient(180deg, rgba(255,255,255,.85), rgba(255,255,255,.35));
    display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--deep);
    box-shadow:0 4px 10px rgba(10,40,80,.18); font-size:17px; }
  .icon-btn:active{ transform:scale(.92); }

  .segmented{ display:flex; gap:4px; margin:0 16px 12px; padding:4px; border-radius:14px;
    background:var(--glass); border:1px solid var(--glass-line); backdrop-filter: blur(14px); }
  .segmented button{ flex:1; border:none; background:transparent; padding:8px 0; border-radius:10px;
    font-family:var(--font); font-weight:700; font-size:13px; color:var(--ink-soft); cursor:pointer; }
  .segmented button.active{ background:var(--glass-strong); color:var(--deep);
    box-shadow:0 2px 6px rgba(10,40,80,.18); }

  .glass{ background:var(--glass); border:1px solid var(--glass-line); backdrop-filter: blur(16px);
    box-shadow:0 10px 24px -8px rgba(10,40,80,.28), inset 0 1px 0 rgba(255,255,255,.5); }
  .panel{ margin:0 16px 14px; border-radius:22px; }
  .row{ display:flex; align-items:center; gap:11px; padding:9px 10px; cursor:pointer; border-radius:14px; }
  .row:active{ background:rgba(255,255,255,.25); }
  .art{ width:46px; height:46px; border-radius:11px; flex:none; position:relative; overflow:hidden;
    box-shadow:0 3px 8px rgba(10,40,80,.3); border:1px solid rgba(255,255,255,.6); }
  .art::after{ content:""; position:absolute; inset:0; background:linear-gradient(180deg, rgba(255,255,255,.55), transparent 55%); }
  .art.big{ width:100%; aspect-ratio:1; border-radius:26px; }
  .art.round{ border-radius:50%; }
  .meta{ min-width:0; flex:1; }
  .t-title{ font-weight:700; font-size:14.5px; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .t-sub{ font-size:12px; color:var(--ink-soft); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:1px;}
  .t-time{ font-size:11.5px; color:var(--ink-faint); font-variant-numeric:tabular-nums; flex:none; }
  .section-title{ margin:16px 20px 8px; font-size:15px; font-weight:800; color:var(--ink); }
  .caption{ font-size:12.5px; color:var(--ink-soft); }

  .grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:16px; padding:0 16px 8px; }
  .tile-title{ font-size:13px; font-weight:700; color:var(--ink); margin-top:7px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .tile-sub{ font-size:11.5px; color:var(--ink-soft); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}

  .search-field{ margin:0 16px 14px; padding:10px 14px; border-radius:14px; display:flex; align-items:center; gap:8px; }
  .search-field input{ border:none; background:transparent; outline:none; font-family:var(--font); font-size:14px; color:var(--ink); width:100%; }
  .search-field input::placeholder{ color:var(--ink-faint); }

  .empty{ margin:60px 30px 0; padding:26px 20px; border-radius:24px; text-align:center; }
  .empty .glyph{ font-size:38px; margin-bottom:8px; filter:drop-shadow(0 4px 8px rgba(10,40,80,.25)); }
  .empty h3{ margin:6px 0 4px; font-size:16px; color:var(--ink); }

  .glossy-btn{ font-family:var(--font); font-weight:700; font-size:13.5px; color:#fff; border:none;
    border-radius:999px; padding:11px 20px; cursor:pointer; position:relative; overflow:hidden;
    box-shadow:0 6px 14px -4px var(--btn-shadow, rgba(21,95,196,.55)); background:var(--btn-grad, linear-gradient(180deg,var(--sky),var(--deep))); }
  .glossy-btn::before{ content:""; position:absolute; inset:2px 2px 50%; border-radius:999px 999px 40px 40px;
    background:linear-gradient(180deg, rgba(255,255,255,.75), rgba(255,255,255,0)); }
  .glossy-btn:active{ transform:scale(.95); }
  .glossy-btn.green{ --btn-grad:linear-gradient(180deg,var(--leaf),#2f9a2b); --btn-shadow:rgba(47,154,43,.5); }
  .glossy-btn.small{ padding:8px 14px; font-size:12.5px; }

  .fab{ position:absolute; top:16px; right:16px; z-index:22; }

  /* mini player */
  .miniplayer{ position:absolute; left:12px; right:12px; bottom:96px; z-index:25; border-radius:20px;
    padding:8px 10px; display:flex; align-items:center; gap:10px; cursor:pointer;
    transition:transform .25s; }
  .miniplayer .t-title{ font-size:13.5px; }
  .mp-progress{ position:absolute; left:14px; right:14px; bottom:5px; height:2.5px; border-radius:2px; background:rgba(255,255,255,.4); overflow:hidden;}
  .mp-progress i{ display:block; height:100%; background:linear-gradient(90deg,var(--sky),var(--deep)); }
  .round-icon{ width:34px; height:34px; border-radius:50%; border:none; flex:none; cursor:pointer; color:#fff;
    display:flex; align-items:center; justify-content:center; font-size:13px; position:relative; overflow:hidden;
    background:linear-gradient(180deg,var(--sky),var(--deep)); box-shadow:0 4px 10px rgba(21,95,196,.5); }
  .round-icon::before{ content:""; position:absolute; inset:1.5px 1.5px 50%; border-radius:50% 50% 40% 40%;
    background:linear-gradient(180deg, rgba(255,255,255,.7), rgba(255,255,255,0)); }
  .round-icon:active{ transform:scale(.9); }
  .round-icon.aqua{ background:linear-gradient(180deg,var(--aqua),#1b8f85); box-shadow:0 4px 10px rgba(27,143,133,.5);}

  /* tab bar */
  .tabbar{ position:absolute; left:0; right:0; bottom:0; z-index:24; display:flex; padding:10px 6px 22px;
    background:var(--glass-strong); backdrop-filter:blur(20px); border-top:1px solid var(--glass-line); }
  .tab{ flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; background:none; border:none;
    color:var(--ink-faint); font-family:var(--font); font-size:10.5px; font-weight:700; cursor:pointer; }
  .tab .ic{ font-size:19px; }
  .tab.active{ color:var(--deep); }

  /* now playing sheet */
  .sheet{ position:absolute; inset:0; z-index:40; border-radius:40px; overflow:hidden;
    transform:translateY(100%); transition:transform .4s cubic-bezier(.32,.9,.4,1);
    background:linear-gradient(165deg, var(--sky), var(--aqua) 55%, var(--leaf) 100%); }
  .sheet.open{ transform:translateY(0); }
  .sheet-inner{ position:absolute; inset:0; display:flex; flex-direction:column; padding:14px 22px 30px; }
  .grabber{ width:38px; height:5px; border-radius:3px; background:rgba(255,255,255,.75); margin:2px auto 10px; }
  .eyebrow{ text-align:center; font-size:11px; font-weight:800; letter-spacing:.14em; color:var(--ink-soft); margin-bottom:14px; }
  .np-art-wrap{ flex:1; display:flex; align-items:center; justify-content:center; min-height:0; padding:6px 10px;}
  .np-art{ width:min(100%,260px); aspect-ratio:1; border-radius:28px; }
  .np-title{ text-align:center; font-size:19px; font-weight:800; color:var(--ink); margin:14px 0 2px;}
  .np-artist{ text-align:center; font-size:14px; color:var(--ink-soft); margin-bottom:16px;}
  .scrubber{ position:relative; height:6px; border-radius:3px; background:rgba(255,255,255,.4); margin:0 2px 6px; cursor:pointer; }
  .scrubber i{ position:absolute; left:0; top:0; bottom:0; border-radius:3px; background:linear-gradient(90deg,var(--sky),var(--deep)); }
  .scrubber b{ position:absolute; top:50%; width:14px; height:14px; background:#fff; border-radius:50%; box-shadow:0 1px 4px rgba(0,0,0,.3); transform:translate(-50%,-50%); }
  .time-row{ display:flex; justify-content:space-between; font-size:11px; color:var(--ink-soft); font-variant-numeric:tabular-nums; margin-bottom:18px;}
  .transport{ display:flex; align-items:center; justify-content:center; gap:22px; margin-bottom:18px;}
  .transport .ghost{ background:none; border:none; font-size:17px; color:var(--ink-soft); cursor:pointer; width:30px;}
  .transport .ghost.active{ color:var(--deep); }
  .transport .big{ width:66px; height:66px; font-size:22px; }
  .transport .med{ width:46px; height:46px; font-size:16px; }
  .bottom-row{ display:flex; justify-content:space-between; padding:0 6px; }
  .bottom-row button{ background:none; border:none; font-size:17px; color:var(--ink-soft); cursor:pointer; padding:8px; }
  .bottom-row button.active{ color:var(--deep); }

  .lyrics-wrap{ flex:1; overflow-y:auto; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; padding:20px 8px; text-align:center;}
  .lyric-line{ font-size:15px; font-weight:600; color:rgba(15,39,64,.5); transition:all .3s; }
  .lyric-line.current{ font-size:19px; font-weight:800; color:var(--deep); }

  .subsheet{ position:absolute; inset:0; z-index:50; background:rgba(10,30,55,.35); backdrop-filter:blur(2px);
    display:flex; align-items:flex-end; opacity:0; pointer-events:none; transition:opacity .25s;}
  .subsheet.open{ opacity:1; pointer-events:auto; }
  .subsheet-card{ width:100%; max-height:82%; background:var(--glass-strong); backdrop-filter:blur(24px);
    border-radius:28px 28px 0 0; border-top:1px solid var(--glass-line); padding:14px 18px 26px;
    display:flex; flex-direction:column; transform:translateY(20px); transition:transform .25s; overflow:hidden;}
  .subsheet.open .subsheet-card{ transform:translateY(0); }
  .subsheet-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;}
  .subsheet-head h3{ margin:0; font-size:16px; color:var(--ink);}
  .link-btn{ background:none; border:none; font-family:var(--font); font-weight:700; font-size:14px; color:var(--deep); cursor:pointer;}
  .subsheet-body{ overflow-y:auto; }
  .name-field{ width:100%; padding:12px 14px; border-radius:14px; border:1px solid var(--glass-line); background:var(--glass);
    font-family:var(--font); font-size:15px; font-weight:700; color:var(--ink); outline:none; margin-bottom:10px;}
  .name-field::placeholder{ color:var(--ink-faint); font-weight:600;}
  .pick-row{ display:flex; align-items:center; gap:10px; padding:8px 6px; cursor:pointer; }
  .pick-check{ width:19px; height:19px; border-radius:50%; border:2px solid var(--ink-faint); flex:none; }
  .pick-check.on{ border-color:var(--leaf); background:var(--leaf); position:relative;}
  .pick-check.on::after{ content:"✓"; position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:#fff; font-size:11px; font-weight:900;}

  .upload-row{ display:flex; align-items:center; gap:10px; padding:10px; border-radius:14px; margin-bottom:8px;}
  .spinner{ width:16px; height:16px; border-radius:50%; border:2px solid rgba(21,95,196,.25); border-top-color:var(--deep);
    animation:spin .7s linear infinite; flex:none;}
  @keyframes spin{ to{ transform:rotate(360deg);} }

  .toast{ position:absolute; left:50%; top:60px; transform:translate(-50%,-140%); z-index:60; padding:10px 18px; border-radius:14px;
    font-size:13px; font-weight:700; color:var(--ink); transition:transform .3s; white-space:nowrap;}
  .toast.show{ transform:translate(-50%,0); }

  a.credit{ position:fixed; bottom:10px; right:14px; color:rgba(255,255,255,.55); font-size:11px; text-decoration:none; z-index:2;}
</style>

<div class="backdrop-bubble" style="width:260px;height:260px;left:4%;top:8%;"></div>
<div class="backdrop-bubble" style="width:140px;height:140px;right:6%;top:14%;animation-delay:1.2s;"></div>
<div class="backdrop-bubble" style="width:90px;height:90px;left:10%;bottom:10%;animation-delay:2.4s;"></div>

<div class="stage">
  <div class="stage-label">
    <h1>Aerofi — click around</h1>
    <p>This is a live HTML mock of the SwiftUI app's screens and interactions, with sample songs standing in for a real library. Tap tabs, play a track, open Now&nbsp;Playing, try Upload.</p>
  </div>

  <div class="phone">
    <div class="screen" id="screen">
      <div class="bokeh" id="bokeh"></div>
      <div class="aquarium" id="aquarium"></div>

      <div class="topbar">
        <h2 id="topTitle">Aerofi</h2>
        <button class="icon-btn" id="uploadBtn" title="Upload music">＋</button>
      </div>

      <div class="content" id="content"></div>

      <div class="miniplayer glass" id="miniplayer" style="display:none;"></div>

      <div class="tabbar" id="tabbar"></div>

      <div class="sheet" id="nowPlayingSheet"></div>
      <div class="subsheet" id="queueSheet"></div>
      <div class="subsheet" id="createPlaylistSheet"></div>
      <div class="subsheet" id="uploadSheet"></div>
      <div class="toast" id="toast"></div>
    </div>
  </div>
</div>

<a class="credit" href="#" onclick="return false">Aerofi UI preview · Frutiger Aero</a>

<script>
/* ---------- mock data ---------- */
const ARTWORKS = [
  ['#7CD1FF','#2E6FE0'], ['#5CE0C6','#178C7A'], ['#8FE38A','#2E8A32'],
  ['#FFD98A','#E08A2E'], ['#B79CFF','#5A3FD6'], ['#7CE0FF','#1AA6C9'],
  ['#FF9CC5','#D64080'], ['#9CFFD0','#26B37B'], ['#FFCB7C','#E0632E']
];
function artStyle(i){ const [a,b]=ARTWORKS[i%ARTWORKS.length]; return `background:linear-gradient(155deg,${a},${b});`; }

const SONGS = [
  {t:"Skyline Drift", ar:"Nova Current", al:"Windward", dur:214, lyrics:"synced"},
  {t:"Coral Static", ar:"Nova Current", al:"Windward", dur:187, lyrics:"none"},
  {t:"Windward (Reprise)", ar:"Nova Current", al:"Windward", dur:142, lyrics:"plain"},
  {t:"Glass Horizon", ar:"Pale Season", al:"Cumulus", dur:231, lyrics:"none"},
  {t:"Low Tide Radio", ar:"Pale Season", al:"Cumulus", dur:198, lyrics:"synced"},
  {t:"Aerial View", ar:"Pale Season", al:"Cumulus", dur:176, lyrics:"none"},
  {t:"Bloomfield", ar:"Glassline", al:"Bloomfield EP", dur:163, lyrics:"plain"},
  {t:"Dew Point", ar:"Glassline", al:"Bloomfield EP", dur:205, lyrics:"none"},
  {t:"Terraced Light", ar:"Glassline", al:"Bloomfield EP", dur:249, lyrics:"none"},
].map((s,i)=>({...s,id:i,art:i}));

const SYNCED = {
  "Skyline Drift":[
    [0,"♪"],[3,"Static in the morning light"],[7,"Runway hum, a slow goodbye"],
    [11,"Coasting where the cloud line breaks"],[15,"Windward, we ride"],
    [19,"Skyline drifting out of view"],[23,"Chrome and glass, a pale blue hue"],
    [27,"Hold the wheel, don't look away"],[31,"We're windward, we ride"],
  ],
  "Low Tide Radio":[
    [0,"♪"],[3,"Static hush, a low tide station"],[7,"Salt air through an open window"],
    [11,"Turn it up, let the static hold you"],[15,"Low tide radio, carry me slow"],
    [19,"Copper light on a rusted dial"],[23,"Every station just a mile"],
  ]
};
const PLAIN = {
  "Windward (Reprise)":"Windward, we ride\nSkyline drifting out of view\nHold the wheel, don't look away",
  "Bloomfield":"Green light through the kitchen glass\nSlow bloom, a season passed\nStay a while, the coffee's on"
};

let PLAYLISTS = [
  {id:1, name:"Morning Drive", songIds:[0,4,6]},
  {id:2, name:"Focus Glass", songIds:[1,5,8]},
];

/* ---------- state ---------- */
const state = {
  tab:'library', seg:'songs', search:'',
  queue: SONGS.map(s=>s.id), qIndex:0, isPlaying:false, t:0,
  shuffled:false, repeat:'off',
  npOpen:false, showLyrics:false,
  activeAlbum:null, activeArtist:null, activePlaylist:null,
  pickSongIds:new Set(), newPlaylistName:'',
  uploads:[],
};

const $ = sel => document.querySelector(sel);
const content = $('#content');

function song(id){ return SONGS.find(s=>s.id===id); }
function fmt(s){ s=Math.max(0,Math.round(s)); return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`; }
function currentSong(){ return state.queue.length ? song(state.queue[state.qIndex]) : null; }

function showToast(msg){
  const el = $('#toast'); el.textContent = msg; el.classList.add('show','glass');
  clearTimeout(showToast._t); showToast._t = setTimeout(()=>el.classList.remove('show'), 1600);
}

/* ---------- playback simulation ---------- */
let timer=null;
function play(){ state.isPlaying=true; ensureTimer(); render(); }
function pause(){ state.isPlaying=false; render(); }
function toggle(){ state.isPlaying ? pause() : play(); }
function ensureTimer(){
  clearInterval(timer);
  timer = setInterval(()=>{
    if(!state.isPlaying) return;
    const cur = currentSong(); if(!cur) return;
    state.t += 1.6; // accelerated demo playback
    if(state.t >= cur.dur){
      if(state.repeat==='one'){ state.t=0; }
      else { skip(1,false); return; }
    }
    renderTimeOnly();
  }, 250);
}
function playSongList(ids, startId){
  state.queue = state.shuffled ? shuffleKeepFirst(ids, startId) : ids.slice();
  state.qIndex = state.queue.indexOf(startId); if(state.qIndex<0) state.qIndex=0;
  state.t = 0; play();
}
function shuffleKeepFirst(ids, first){
  const rest = ids.filter(i=>i!==first);
  for(let i=rest.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [rest[i],rest[j]]=[rest[j],rest[i]]; }
  return [first, ...rest];
}
function skip(dir, user=true){
  if(!state.queue.length) return;
  let ni = state.qIndex+dir;
  if(ni<0) ni = state.repeat==='all' ? state.queue.length-1 : 0;
  if(ni>=state.queue.length){ if(state.repeat==='all') ni=0; else { pause(); return; } }
  state.qIndex=ni; state.t=0; if(user||state.isPlaying) play(); else render();
}
function toggleShuffle(){
  state.shuffled=!state.shuffled;
  const cur = currentSong();
  if(cur){ state.queue = state.shuffled ? shuffleKeepFirst(state.queue, cur.id) : SONGS.map(s=>s.id); state.qIndex=0; }
  render();
}
function cycleRepeat(){ state.repeat = state.repeat==='off'?'all':state.repeat==='all'?'one':'off'; render(); }

function lyricsHTML(cur){
  if(cur.lyrics==='synced'){
    const lines = SYNCED[cur.t]||[]; let curIdx=0;

    return `<div class="lyrics-wrap">${lines.map((l,i)=>`<div class="lyric-line ${i===curIdx?'current':''}">${esc(l[1])}</div>`).join('')}</div>`;
  }
  if(cur.lyrics==='plain'){
    return `<div class="lyrics-wrap"><div class="lyric-line current" style="white-space:pre-line;line-height:1.6;">${esc(PLAIN[cur.t]||'')}</div></div>`;
  }
  return `<div class="empty glass" style="margin:0 20px;"><div class="glyph">💬</div><div class="caption">No lyrics found for this song.</div></div>`;
}

function simulateUpload(){
  const name = UPLOAD_NAMES[Math.floor(Math.random()*UPLOAD_NAMES.length)] + ".mp3";
  const u = {name, phase:'copy', label:'Copying file…'};
  state.uploads.unshift(u); renderUploadListOnly();
  const steps = [
    [700,'meta','Reading metadata…'], [1200,'lyrics','Fetching lyrics…'], [900,'done','Added to library'],
  ];
  let delay=0;
  steps.forEach(([ms,phase,label])=>{
    delay+=ms;
    setTimeout(()=>{
      u.phase=phase; u.label=label; renderUploadListOnly();
      if(phase==='done'){
        const newSong = {id:SONGS.length, t:name.replace('.mp3',''), ar:'Unknown Artist', al:'Unknown Album', dur:180+Math.floor(Math.random()*60), lyrics:Math.random()>0.5?'plain':'none', art:SONGS.length};

      }
    }, delay);
  });
}

const GRASS_SVG = `<svg viewBox="0 0 60 95" width="58">
  <path d="M12 95 Q6 52 18 16" stroke="#3fae4a" stroke-width="5" fill="none" stroke-linecap="round" opacity=".5"/>
  <path d="M28 95 Q33 48 22 8" stroke="#57c95f" stroke-width="6" fill="none" stroke-linecap="round" opacity=".55"/>
  <path d="M44 95 Q41 58 52 24" stroke="#2f9a3c" stroke-width="5" fill="none" stroke-linecap="round" opacity=".45"/>
</svg>`;

function renderAquarium(){
  const fleet = [ // kind, top %, width px, duration s, delay s, direction
    ['clown', 13, 62, 26, 0, 1],
    ['tang', 29, 74, 34, -9, -1],
    ['idol', 47, 60, 44, -21, 1],
    ['clown', 66, 42, 21, -13, -1],
    ['tang', 82, 50, 30, -26, 1],
  ];
  const fishHTML = fleet.map(([k,top,w,dur,delay,dir])=>
    `<div class="fish" style="top:${top}%;width:${w}px;animation:${dir>0?'swimLR':'swimRL'} ${dur}s linear ${delay}s infinite;">
       <div class="bob" style="animation-delay:${delay}s;"><span style="display:block;${dir<0?'transform:scaleX(-1);':''}">${FISH_SVG[k]}</span></div>
     </div>`).join('');
  let bubbleHTML='';
  for(let i=0;i<12;i++){
    const size = 5+((i*47)%13), left = (i*8.3+4)%94, dur = 9+((i*31)%9), delay = -((i*17)%18);
    bubbleHTML += `<span class="bubble" style="left:${left}%;width:${size}px;height:${size}px;animation-duration:${dur}s;animation-delay:${delay}s;"></span>`;
  }
  const grassHTML = `<div class="grass-wrap" style="left:4px;">${GRASS_SVG}</div>
    <div class="grass-wrap" style="right:4px;transform:scaleX(-1);"><span style="display:block;">${GRASS_SVG}</span></div>`;
  $('#aquarium').innerHTML = fishHTML + bubbleHTML + grassHTML;
}

/* ---------- bokeh backdrop inside phone ---------- */
function renderBokeh(){
  const spots=[[70,60,'8%','10%'],[40,30,'75%','6%'],[100,90,'65%','30%'],[30,25,'15%','55%'],[130,120,'50%','78%']];
  $('#bokeh').innerHTML = spots.map(([w,h,l,t],i)=>`<span style="width:${w}px;height:${h}px;left:${l};top:${t};animation-delay:${i*0.6}s;"></span>`).join('');
}

/* ---------- master render ---------- */
function render(){
  renderTopbar(); renderContent(); renderTabbar(); renderMiniplayer(); renderNowPlaying();
}
function renderTimeOnly(){
  renderMiniplayer();
  if(state.npOpen) renderNowPlaying();
}

$('#uploadBtn').addEventListener('click', openUpload);
document.getElementById('screen').addEventListener('click', e=>{
  if(e.target.id==='queueSheet') closeQueue();
  if(e.target.id==='createPlaylistSheet') closeCreatePlaylist();
  if(e.target.id==='uploadSheet') closeUpload();
});

renderBokeh();
renderAquarium();
render();
</script>
